<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>
async function main() {

  await liff.init({ liffId: "2009302184-eNP2fK7W" });

  const urlParams = new URLSearchParams(window.location.search);
  const gifUrl = urlParams.get("url");

  if (!gifUrl) {
    alert("缺少圖片網址");
    return;
  }

  await liff.sendMessages([
    {
      type: "image",
      originalContentUrl: gifUrl,
      previewImageUrl: gifUrl
    }
  ]);

  liff.closeWindow();
}

main();
</script>

</body>
</html>
