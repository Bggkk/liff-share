<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sticker Card</title>
  <style>
    body{
      margin:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    img{
      max-width:100%;
      max-height:100%;
    }
  </style>
</head>
<body>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const imgUrl = urlParams.get("img");

  if(!imgUrl){
    document.body.innerHTML = "<h2 style='color:white'>缺少圖片參數</h2>";
  }else{
    const img = document.createElement("img");
    img.src = imgUrl;
    document.body.appendChild(img);
  }
</script>

</body>
</html>
