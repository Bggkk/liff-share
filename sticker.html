<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>
async function main() {

  await liff.init({ liffId: "2009302184-eNP2fK7W" });

  const params = new URLSearchParams(window.location.search);
  const imageUrl = params.get("url");

  if (!imageUrl) {
    alert("缺少圖片網址");
    return;
  }

  await liff.sendMessages([
    {
      type: "flex",
      altText: "貼圖",
      contents: {
        type: "bubble",
        hero: {
          type: "image",
          url: imageUrl,
          size: "full",
          aspectRatio: "1:1",
          aspectMode: "cover"
        }
      }
    }
  ]);

  liff.closeWindow();
}

main();
</script>

</body>
</html>
