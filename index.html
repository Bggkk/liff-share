<!DOCTYPE html>
<html>
<head>
  <title>卡片分享</title>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h3>正在準備中...</h3>

  <script>
    async function main() {

      await liff.init({ liffId: "2007303884-g2wdGNQ4" });

      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get("type");

      if (!type) {
        alert("缺少類型參數！");
        return;
      }

      // ==============================
      // 🔥 貼圖模式（不分享，只顯示）
      // ==============================
      if (type === "sticker") {

        const imgUrl = urlParams.get("img");

        if (!imgUrl) {
          alert("缺少圖片參數");
          return;
        }

        document.body.innerHTML = "";
        document.body.style.margin = "0";
        document.body.style.background = "#000";

        const img = document.createElement("img");
        img.src = imgUrl;
        img.style.width = "100%";
        img.style.display = "block";

        document.body.appendChild(img);
        return;
      }

      let flexMsg = null;

      // ==============================
      // GigaFile 分享
      // ==============================
      if (type === "gigafile") {

        const filename = urlParams.get("filename") || "未知";
        const filesize = urlParams.get("filesize") || "未知";
        const deadline = urlParams.get("deadline") || "未知";
        const fileurl = urlParams.get("url") || "#";

        flexMsg = {
          type: "flex",
          altText: "GigaFile 影片",
          contents: {
            type: "bubble",
            hero: {
              type: "image",
              url: "https://i.imgur.com/suPTpBm.jpeg",
              size: "full",
              aspectRatio: "16:9",
              aspectMode: "cover"
            },
            body: {
              type: "box",
              layout: "vertical",
              spacing: "sm",
              contents: [
                { type: "text", text: filename, weight: "bold", size: "md", wrap: true },
                { type: "text", text: "大小：" + filesize, size: "sm", color: "#666666" },
                { type: "text", text: "有效期限：" + deadline, size: "sm", color: "#666666" }
              ]
            },
            footer: {
              type: "box",
              layout: "vertical",
              spacing: "sm",
              contents: [
                {
                  type: "button",
                  style: "primary",
                  action: {
                    type: "uri",
                    label: "點進網頁",
                    uri: fileurl
                  }
                },
                {
                  type: "button",
                  style: "secondary",
                  action: {
                    type: "uri",
                    label: "分享",
                    uri: liff.permanentLink.createUrl()
                  }
                }
              ]
            }
          }
        };
      }

      // ==============================
      // 油價分享
      // ==============================
      else if (type === "gas") {

        const update = urlParams.get("update") || "未知";
        const time = urlParams.get("time") || "未知";
        const change = urlParams.get("change") || "無資料";
        const p92 = urlParams.get("p92") || "N/A";
        const p95 = urlParams.get("p95") || "N/A";
        const p98 = urlParams.get("p98") || "N/A";
        const alcohol = urlParams.get("alcohol") || "N/A";
        const diesel = urlParams.get("diesel") || "N/A";
        const gas = urlParams.get("gas") || "N/A";

        flexMsg = {
          type: "flex",
          altText: "油價資訊分享",
          contents: {
            type: "bubble",
            size: "mega",
            body: {
              type: "box",
              layout: "vertical",
              spacing: "sm",
              contents: [
                { type: "text", text: "【油價資訊】", weight: "bold", size: "xl" },
                { type: "text", text: `公告日期：${update}`, size: "sm", color: "#888888" },
                { type: "text", text: `查看時間：${time}`, size: "sm", color: "#888888" },
                { type: "text", text: `調整幅度：${change}`, size: "sm", color: "#d0021b" },
                { type: "separator", margin: "md" },
                { type: "text", text: `92無鉛：${p92} 元` },
                { type: "text", text: `95無鉛：${p95} 元` },
                { type: "text", text: `98無鉛：${p98} 元` },
                { type: "text", text: `酒精汽油：${alcohol} 元` },
                { type: "text", text: `超級柴油：${diesel} 元` },
                { type: "text", text: `液化石油氣：${gas} 元` },
                { type: "text", text: `BOT作者：小楓` }
              ]
            },
            footer: {
              type: "box",
              layout: "vertical",
              contents: [
                {
                  type: "button",
                  style: "primary",
                  action: {
                    type: "uri",
                    label: "分享油價卡片",
                    uri: liff.permanentLink.createUrl()
                  }
                }
              ]
            }
          }
        };
      }

      // ==============================
      // 分享功能（只有 gas / gigafile 會跑到這）
      // ==============================
      if (flexMsg && liff.isApiAvailable('shareTargetPicker')) {
        await liff.shareTargetPicker([flexMsg]);
        liff.closeWindow();
      }
    }

    main();
  </script>
</body>
</html>
