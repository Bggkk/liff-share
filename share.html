<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>分享名片</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<script>

async function main(){

    await liff.init({
        liffId: "2009302184-eNP2fK7W"
    });

    const flex = {
        "type": "flex",
        "altText": "名片",
        "contents": {
            "type": "bubble",
            "size": "mega",
            "hero": {
                "type": "image",
                "url": "https://i.imgur.com/8Km9tLL.jpg",
                "size": "full",
                "aspectRatio": "20:13",
                "aspectMode": "cover"
            },
            "body": {
                "type": "box",
                "layout": "vertical",
                "contents":[
                    {
                        "type":"text",
                        "text":"名片標題",
                        "size":"xl",
                        "weight":"bold"
                    },
                    {
                        "type":"text",
                        "text":"名片內容",
                        "wrap":true
                    }
                ]
            }
        }
    };

    await liff.shareTargetPicker([flex]);

    liff.closeWindow();

}

main();

</script>

</body>
</html>
